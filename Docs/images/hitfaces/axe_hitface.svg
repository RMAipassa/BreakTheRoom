<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 160">
  <defs>
    <linearGradient id="haft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="1" stop-color="#101010"/>
    </linearGradient>
  </defs>
  <rect width="360" height="160" fill="#fff"/>

  <!-- Handle -->
  <polygon points="56,128 204,74 216,84 68,138" fill="url(#haft)"/>

  <!-- Square axe head block attached to handle -->
  <polygon points="204,62 252,50 270,68 222,80" fill="#151515"/>
  <polygon points="222,80 270,68 270,98 222,110" fill="#1f1f1f"/>

  <!-- Outer cutting face (not attached to handle) marked red -->
  <line x1="270" y1="68" x2="270" y2="98" stroke="#c20000" stroke-width="8" stroke-linecap="round"/>
</svg>
